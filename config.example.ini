# Copy this file to config.ini and adjust the paths for your own PC.

[Paths]
RootDir=C:\QBMedia
# SourceDir=C:\Path\To\Downloads
# DoneDir=C:\Path\To\Done
# MediaDir=C:\Path\To\Media
# LogsDir=C:\Path\To\Logs
# MetadataDir=C:\Path\To\Metadata
# TempDir=C:\Path\To\Temp
ToolsDir=C:\Video

[Files]
FBSettingsFile=Filebot\data\settings.properties
AuthFile=OpenSubtitles.auth
MFormat={n}.{y}
SFormat={n}.{y}/S{s.pad(2)}/{n} S{s00e00}
delext=*.jpg,*.txt,*.nfo
Originals=keep
Rejected=remove
LogHistory=remove
TempFolder=keep
MediaFolder=keep
MetadataFolder=remove

[Executables]
CheckLangExe=C:\Video\LangCheck.exe
AlassExe=C:\Video\Alass\bin\alass-cli.exe
FFSubSyncExe=C:\Video\ffsubsync.exe
AutoSubSyncExe=C:\Video\AutoSubSync-v6.3\AutoSubSync.exe
TranslatorExe=C:\Python\311\python.exe
TranslatorScript=C:\QBtor\translate_srt_argos.py
TranslatorPackagesDir=C:\Video\translate_srt_argos\argos-packages
STTExe=C:\Video\Faster-Whisper-XXL\faster-whisper-xxl.exe
FFmpegExe=C:\Video\ffmpeg\ffmpeg.exe
FFprobeExe=C:\Video\ffmpeg\ffprobe.exe

[Lang]
LangKeep=dut
LangFallback=eng
TranslateMode=fallback

[STT]
STTEnabled=true
STTModel=medium
STTLanguage=eng
STTMultilingual=auto
STTDetectionSegments=5
STTOutputLang=eng
STTModelDir=C:\Video\Faster-Whisper-XXL\_models

[Audio]
AudioLangKeep=eng,dut
AudioFilterEnabled=true
AudioFallbackFirst=true

[Subtitles]
DownloadSubs=false
EmbedOnlyPrimary=true
EmbedDefault=true
EmbedForced=false
SyncMode=always
SyncDebug=false

[ALASS]
AlassSplitPenalty=
AlassInterval=
AlassSpeedOptimization=
AlassDisableFpsGuessing=false
AlassNoSplit=false
AlassEncodingInc=
AlassEncodingRef=

[FFSubSync]
FFSubSyncMaxOffset=
FFSubSyncMaxSubtitleSeconds=
FFSubSyncStartSeconds=0
FFSubSyncVAD=subs_then_webrtc
FFSubSyncFrameRate=
FFSubSyncNoFixFramerate=false
FFSubSyncEncoding=utf-8
FFSubSyncOutputEncoding=utf-8
